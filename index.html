    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; overflow: hidden; }

        .seo-text { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

        .splash {
            position: fixed; inset: 0; background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .splash.hide { opacity: 0; pointer-events: none; }

        .splash-container { text-align: center; animation: fadeUp 0.7s ease-out; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .image-wrapper { position: relative; display: inline-block; }
        .image-wrapper::before {
            content: ''; position: absolute; inset: -20%;
            background: radial-gradient(circle, rgba(0, 51, 102, 0.08) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%; animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { transform: scale(0.8); opacity: 0.3; } 50% { transform: scale(1.2); opacity: 0.6; } }

        .ribbon {
            width: 160px; height: auto; display: block;
            animation: drawRibbon 1.4s forwards, gentleFloat 3s infinite 1.5s;
            filter: drop-shadow(0 8px 20px rgba(0, 51, 102, 0.15));
        }

        @keyframes drawRibbon {
            0% { opacity: 0; transform: scale(0) rotate(-25deg); filter: blur(12px); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0); }
        }

        @keyframes gentleFloat { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-5px); } }

        .loader { margin: 48px auto 0; position: relative; width: 48px; height: 48px; }
        .loader-ring {
            position: absolute; width: 100%; height: 100%;
            border: 3px solid rgba(0, 51, 102, 0.1); border-top-color: #003366;
            border-radius: 50%; animation: spin 0.9s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            margin-top: 30px; font-size: 13px; color: #003366;
            font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        .dot { width: 4px; height: 4px; background: #003366; border-radius: 50%; animation: bounce 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.1s; }
        .dot:nth-child(3) { animation-delay: 0.2s; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    </style>
