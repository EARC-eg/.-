    <title>elgoharyX · اختصار الروابط</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { 
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; 
            -webkit-font-smoothing: antialiased;
        }
        
        :root {
            --blue: #007AFF;
            --green: #34C759;
            --red: #FF3B30;
            --bg-primary: #F2F2F7;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #F8F8FC;
            --text-primary: #000000;
            --text-secondary: #8E8E93;
            --border-color: #E5E5EA;
            --shadow: rgba(0,0,0,0.1);
        }
        
        .dark-mode {
            --bg-primary: #000000;
            --bg-secondary: #1C1C1E;
            --bg-tertiary: #2C2C2E;
            --text-primary: #FFFFFF;
            --text-secondary: #98989E;
            --border-color: #38383A;
            --shadow: rgba(255,255,255,0.1);
        }
        
        body { 
            background: var(--bg-primary); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            margin: 0;
            color: var(--text-primary);
            transition: background 0.4s, color 0.3s;
            overflow-x: hidden;
        }
        
        .container { 
            width: 100%; 
            max-width: 428px; 
            background: var(--bg-primary); 
            min-height: 100vh;
            position: relative;
            padding: 16px;
        }
        
        @keyframes floatIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .card { 
            background: var(--bg-secondary); 
            border-radius: 16px; 
            padding: 20px; 
            margin-bottom: 16px;
            color: var(--text-primary);
            animation: floatIn 0.5s forwards;
            box-shadow: 0 2px 8px var(--shadow);
            border: 0.5px solid var(--border-color);
        }
        
        .input-group { 
            background: var(--bg-tertiary); 
            border-radius: 14px; 
            padding: 4px 16px; 
            margin-bottom: 16px; 
            border: 0.5px solid var(--border-color);
            transition: all 0.3s;
        }
        
        .input-group:focus-within { 
            border-color: var(--blue); 
            background: var(--bg-secondary);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.15);
        }
        
        .input-label { 
            font-size: 11px; 
            color: var(--text-secondary); 
            text-transform: uppercase; 
            padding-top: 8px;
            font-weight: 600;
            letter-spacing: 0.8px;
        }
        
        .input-field { 
            width: 100%; 
            border: none; 
            background: transparent; 
            padding: 8px 0 10px; 
            font-size: 16px; 
            outline: none; 
            color: var(--text-primary);
        }
        
        .input-field::placeholder {
            color: var(--text-secondary);
        }
        
        .btn { 
            background: var(--blue); 
            color: white; 
            font-size: 17px; 
            font-weight: 600; 
            padding: 14px; 
            border-radius: 14px; 
            border: none; 
            width: 100%; 
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        
        .btn:active { 
            transform: scale(0.96);
        }
        
        .btn:disabled { 
            opacity: 0.5; 
            transform: none;
        }
        
        .dir-ltr { direction: ltr; text-align: left; }
        .hidden { display: none !important; }
        
        .link-item { 
            background: var(--bg-tertiary); 
            border-radius: 14px; 
            padding: 16px; 
            margin-bottom: 10px;
            transition: all 0.3s;
            animation: floatIn 0.4s forwards;
            border: 0.5px solid transparent;
        }

        .link-item:hover {
            border-color: var(--blue);
        }

        .link-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(0,122,255,0.15), rgba(0,122,255,0.05));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--blue);
        }
        
        .link-actions { 
            display: flex; 
            gap: 8px; 
            margin-top: 12px; 
        }
        
        .link-btn { 
            flex: 1; 
            padding: 10px; 
            border-radius: 10px; 
            text-align: center; 
            font-size: 13px; 
            font-weight: 500; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.3s;
        }
        
        .btn-copy { background: rgba(52,199,89,0.1); color: var(--green); }
        .btn-edit { background: rgba(0,122,255,0.1); color: var(--blue); }
        .btn-delete { background: rgba(255,59,48,0.1); color: var(--red); }
        
        .loader { 
            width: 44px; 
            height: 44px; 
            border: 3px solid var(--border-color); 
            border-top-color: var(--blue); 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
            margin: 20px auto;
        }
        
        .toast { 
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%) translateY(100px); 
            background: #1C1C1E; 
            color: white; 
            padding: 14px 24px; 
            border-radius: 30px; 
            font-size: 15px; 
            z-index: 2000; 
            display: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            font-weight: 500;
            transition: transform 0.4s;
            backdrop-filter: blur(10px);
        }
        
        .toast.show { 
            display: block; 
            transform: translateX(-50%) translateY(0);
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .avatar { 
            width: 80px; 
            height: 80px; 
            border-radius: 20px; 
            margin: 20px auto 16px; 
            display: block; 
            object-fit: cover;
            box-shadow: 0 4px 12px var(--shadow);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
            margin: 0;
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 14px;
            cursor: pointer;
            margin-top: 20px;
            color: var(--text-primary);
            font-weight: 500;
            border: 0.5px solid var(--border-color);
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            border-color: var(--blue);
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <!-- الهيدر -->
        <div class="header">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiH5Tji4WfG5r2d_T0XAd2LBBNB28t2dhFqJAcbR5JSpyMqqNB6IbugiC2Vos-2smWIa3tMpA7kEHf3iMcHSsbmkZUw9I1AwP-ocTRnlzLDJWjCb8eH5m2cRXiWpIa-O6a1bOSdyB9hUg-FepVa9QPjTs8Co6nX0_GDnednjERDFmN1quZbkIbW5wQjh2I/s1024/103777.png" class="avatar" alt="Logo">
            <h1>elgoharyX</h1>
            <p>منصة اختصار الروابط الاحترافية</p>
        </div>

        <!-- بطاقة إنشاء الرابط -->
        <div class="card">
            <div class="input-group">
                <div class="input-label">
                    <i class="fas fa-link" style="margin-left: 4px;"></i>
                    الرابط الأصلي
                </div>
                <input type="url" id="longUrl" class="input-field dir-ltr" placeholder="https://example.com/very-long-url">
            </div>
            <div class="input-group">
                <div class="input-label">
                    <i class="fas fa-tag" style="margin-left: 4px;"></i>
                    معرف مخصص (اختياري)
                </div>
                <input type="text" id="customSlug" class="input-field dir-ltr" placeholder="my-custom-link">
            </div>
            <button class="btn" onclick="createLink()" id="shortenBtn">
                <i class="fas fa-scissors"></i>
                اختصار الرابط
            </button>
            
            <!-- نتيجة الاختصار -->
            <div id="resultArea" class="hidden" style="margin-top: 16px;">
                <div style="background: var(--bg-tertiary); border-radius: 12px; padding: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;">
                    <a id="shortLink" href="#" target="_blank" class="dir-ltr" style="color: var(--blue); text-decoration: none; word-break: break-all; flex: 1; min-width: 200px;"></a>
                    <span onclick="copyLink()" style="color: var(--blue); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; white-space: nowrap;">
                        <i class="far fa-copy"></i>
                        نسخ
                    </span>
                </div>
            </div>
        </div>

        <!-- قائمة الروابط المختصرة -->
        <div class="card">
            <div class="section-title">
                <i class="fas fa-list" style="color: var(--blue);"></i>
                روابطي المختصرة
            </div>
            
            <div id="linksLoading"><div class="loader"></div></div>
            <div id="linksList"></div>
            <div id="emptyState" class="hidden" style="text-align: center; padding: 40px 20px; color: var(--text-secondary);">
                <i class="fas fa-link" style="font-size: 48px; margin-bottom: 16px; opacity: 0.3;"></i>
                <p style="font-size: 16px;">لا توجد روابط مختصرة بعد</p>
                <p style="font-size: 14px; margin-top: 4px;">قم بإنشاء أول رابط مختصر لك!</p>
            </div>
        </div>

        <!-- تبديل الوضع الليلي -->
        <div class="theme-toggle" onclick="toggleTheme()">
            <i class="fas fa-moon" id="themeIcon"></i>
            <span id="themeLabel">الوضع الليلي</span>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGhCAU7DLleD1KkCR6SQmvl8bpDncHJ8g",
            authDomain: "planning-with-ai-797ec.firebaseapp.com",
            projectId: "planning-with-ai-797ec",
            databaseURL: "https://planning-with-ai-797ec-default-rtdb.firebaseio.com",
            storageBucket: "planning-with-ai-797ec.firebasestorage.app",
            messagingSenderId: "283439580292",
            appId: "1:283439580292:web:b566dc267bdb8861ca2ed1"
        };

        let app, db;
        // معرف جهاز ثابت لتخزين الروابط
        const DEVICE_ID = 'shortener_user_' + (localStorage.getItem('shortener_device_id') || (() => {
            const id = Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('shortener_device_id', id);
            return id;
        })());

        try {
            app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            console.log('✅ Firebase connected');
        } catch (e) {
            console.error('Firebase error:', e);
            showToast('خطأ في الاتصال بقاعدة البيانات');
        }

        // عرض الإشعارات
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // تبديل الوضع الليلي
        window.toggleTheme = function() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            
            if (isDark) {
                document.getElementById('themeIcon').className = 'fas fa-sun';
                document.getElementById('themeLabel').textContent = 'الوضع النهاري';
                localStorage.setItem('theme', 'dark');
            } else {
                document.getElementById('themeIcon').className = 'fas fa-moon';
                document.getElementById('themeLabel').textContent = 'الوضع الليلي';
                localStorage.setItem('theme', 'light');
            }
        };

        // إنشاء رابط مختصر
        window.createLink = async function() {
            const longUrl = document.getElementById('longUrl').value.trim();
            let customSlug = document.getElementById('customSlug').value.trim().toLowerCase();
            
            if (!longUrl) {
                showToast('الرجاء إدخال الرابط الأصلي');
                return;
            }

            // التحقق من صحة الرابط
            if (!longUrl.startsWith('http://') && !longUrl.startsWith('https://')) {
                showToast('الرابط يجب أن يبدأ بـ http:// أو https://');
                return;
            }

            const btn = document.getElementById('shortenBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الاختصار...';

            try {
                // توليد معرف تلقائي إذا لم يتم تحديد مخصص
                if (!customSlug) {
                    customSlug = Math.random().toString(36).substring(2, 8);
                } else {
                    // تنظيف المعرف المخصص
                    customSlug = customSlug.replace(/[^a-z0-9-_]/g, '');
                    if (customSlug.length < 2) {
                        showToast('المعرف المخصص يجب أن يكون حرفين على الأقل');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-scissors"></i> اختصار الرابط';
                        return;
                    }
                }

                // التحقق من عدم وجود المعرف مسبقاً
                const slugSnap = await get(ref(db, 'links/' + customSlug));
                if (slugSnap.exists()) {
                    showToast('المعرف مستخدم بالفعل، الرجاء اختيار معرف آخر');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-scissors"></i> اختصار الرابط';
                    return;
                }

                // حفظ الرابط
                const linkData = {
                    target: longUrl,
                    created_at: new Date().toISOString(),
                    created_by: DEVICE_ID
                };

                await set(ref(db, 'links/' + customSlug), linkData);
                await set(ref(db, 'user_links/' + DEVICE_ID + '/' + customSlug), {
                    target: longUrl,
                    created_at: new Date().toISOString()
                });

                // عرض النتيجة
                const shortUrl = `${location.origin}${location.pathname}?${customSlug}`;
                document.getElementById('shortLink').innerText = shortUrl;
                document.getElementById('shortLink').href = shortUrl;
                document.getElementById('resultArea').classList.remove('hidden');
                
                // تنظيف الحقول
                document.getElementById('longUrl').value = '';
                document.getElementById('customSlug').value = '';
                
                showToast('✅ تم اختصار الرابط بنجاح!');
                loadLinks();
            } catch (e) {
                showToast('خطأ: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-scissors"></i> اختصار الرابط';
            }
        };

        // نسخ الرابط المختصر
        window.copyLink = function() {
            const shortLink = document.getElementById('shortLink').innerText;
            navigator.clipboard.writeText(shortLink).then(() => {
                showToast('📋 تم نسخ الرابط المختصر');
            }).catch(() => {
                showToast('فشل النسخ، حاول يدوياً');
            });
        };

        // نسخ رابط من القائمة
        window.copyLinkFromList = function(slug) {
            const url = `${location.origin}${location.pathname}?${slug}`;
            navigator.clipboard.writeText(url).then(() => {
                showToast('📋 تم نسخ الرابط');
            });
        };

        // فتح الرابط الأصلي
        window.openOriginalLink = function(slug) {
            get(ref(db, 'links/' + slug)).then(snap => {
                if (snap.exists()) {
                    window.open(snap.val().target, '_blank');
                }
            });
        };

        // حذف رابط
        window.deleteLink = async function(slug) {
            if (!confirm('هل أنت متأكد من حذف هذا الرابط؟')) return;
            
            try {
                await remove(ref(db, 'links/' + slug));
                await remove(ref(db, 'user_links/' + DEVICE_ID + '/' + slug));
                showToast('🗑️ تم حذف الرابط');
                loadLinks();
            } catch (e) {
                showToast('فشل الحذف');
            }
        };

        // تحميل قائمة الروابط
        function loadLinks() {
            const linksRef = ref(db, 'user_links/' + DEVICE_ID);
            
            onValue(linksRef, (snapshot) => {
                document.getElementById('linksLoading').style.display = 'none';
                const listDiv = document.getElementById('linksList');
                listDiv.innerHTML = '';

                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const slugs = Object.keys(data);
                    
                    if (slugs.length === 0) {
                        document.getElementById('emptyState').classList.remove('hidden');
                        return;
                    }

                    document.getElementById('emptyState').classList.add('hidden');
                    
                    slugs.reverse().forEach((slug, index) => {
                        const item = data[slug];
                        const createdAt = new Date(item.created_at).toLocaleDateString('ar-EG', {
                            year: 'numeric', month: 'short', day: 'numeric'
                        });
                        const shortUrl = `${location.origin}${location.pathname}?${slug}`;
                        
                        const div = document.createElement('div');
                        div.className = 'link-item';
                        div.style.animationDelay = (index * 0.05) + 's';
                        div.innerHTML = `
                            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                                <div class="link-icon"><i class="fas fa-link"></i></div>
                                <div>
                                    <span class="dir-ltr" style="font-weight: 600;">${slug}</span>
                                    <div style="font-size: 11px; color: var(--text-secondary);">${createdAt}</div>
                                </div>
                            </div>
                            <div class="dir-ltr" style="font-size: 12px; color: var(--blue); margin-bottom: 4px; word-break: break-all;">
                                ${shortUrl}
                            </div>
                            <div class="dir-ltr" style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; word-break: break-all;">
                                <i class="fas fa-arrow-left" style="font-size: 10px;"></i> ${item.target}
                            </div>
                            <div class="link-actions">
                                <div class="link-btn btn-copy" onclick="copyLinkFromList('${slug}')">
                                    <i class="far fa-copy"></i> نسخ
                                </div>
                                <div class="link-btn btn-edit" onclick="openOriginalLink('${slug}')">
                                    <i class="fas fa-external-link-alt"></i> فتح
                                </div>
                                <div class="link-btn btn-delete" onclick="deleteLink('${slug}')">
                                    <i class="far fa-trash-alt"></i> حذف
                                </div>
                            </div>
                        `;
                        listDiv.appendChild(div);
                    });
                } else {
                    document.getElementById('emptyState').classList.remove('hidden');
                }
            });
        }

        // توجيه الروابط المختصرة
        async function redirect() {
            const params = new URLSearchParams(location.search);
            const slug = Array.from(params.keys())[0];
            
            if (!slug) return;

            // إخفاء الواجهة أثناء التوجيه
            document.body.innerHTML = `
                <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif;">
                    <div style="text-align: center;">
                        <div style="width: 44px; height: 44px; border: 3px solid #E5E5EA; border-top-color: #007AFF; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto;"></div>
                        <div style="font-size: 22px; font-weight: 600; margin-top: 24px;">جاري التوجيه...</div>
                    </div>
                </div>
                <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
            `;

            try {
                const snap = await get(ref(db, 'links/' + slug));
                if (snap.exists()) {
                    setTimeout(() => {
                        location.replace(snap.val().target);
                    }, 500);
                } else {
                    document.body.innerHTML = `
                        <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif;">
                            <div style="text-align: center;">
                                <div style="font-size: 48px; margin-bottom: 16px;">🔗</div>
                                <div style="font-size: 22px; font-weight: 600;">الرابط غير موجود</div>
                                <div style="color: #8E8E93; margin-top: 8px;">هذا الرابط المختصر غير صالح أو تم حذفه</div>
                                <a href="${location.origin}${location.pathname}" style="display: inline-block; margin-top: 20px; background: #007AFF; color: white; padding: 14px 30px; border-radius: 14px; text-decoration: none; font-weight: 600;">العودة للرئيسية</a>
                            </div>
                        </div>
                    `;
                }
            } catch (e) {
                location.href = location.origin + location.pathname;
            }
        }

        // التهيئة عند تحميل الصفحة
        window.addEventListener('DOMContentLoaded', () => {
            // تحميل الوضع الليلي المحفوظ
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeIcon').className = 'fas fa-sun';
                document.getElementById('themeLabel').textContent = 'الوضع النهاري';
            }

            // التحقق من وجود رابط للتوجيه
            if (location.search.length > 1) {
                redirect();
                return;
            }

            // تحميل قائمة الروابط
            loadLinks();
        });
    </script>
</body>
</html>
